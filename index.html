        <td class="given-cell">N/A</td>
      </tr>
      <tr>
        <td class="dev-cell" style="border-top:none"></td>
        <td class="iface-cell"></td>
        <td class="given-cell">${v.linkLocal}</td>
        <td class="given-cell">—</td>
        <td class="given-cell">N/A</td>
      </tr>`;
    }
  });

  const totalInputs = rows.reduce((a,r)=>a+r.cells.filter(c=>c.editable).length,0);

  document.getElementById('ex-phase1-area').innerHTML=`
    <div class="ex-addr-wrap">
      <div class="ex-addr-title">Adresseringstabel — ${v.rName} netwerk</div>
      <div class="ex-addr-subtitle">
        Bereken de IPv4 adressen op basis van de opgave. LAN 1 en LAN 2 gebruiken verschillende prefixen.
        IPv6 GUA en link-local zijn al gegeven (italic).
      </div>
      <div class="ex-network-banner">
        <strong>Basisnetwerk:</strong>&nbsp;<code>${v.base}/24</code>
        &nbsp;·&nbsp; LAN 1 vereist: <strong>${v.lan1Hosts} hosts</strong>
        &nbsp;·&nbsp; LAN 2 vereist: <strong>${v.lan2Hosts} hosts</strong>
      </div>
      <div class="ex-topo-wrap">${topoSvg}</div>
      <table class="ex-addr-table">
        <thead><tr><th>Device</th><th>Interface</th><th>IP Address</th><th>Subnet Mask</th><th>Default Gateway</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
      <div class="ex-addr-btns">
        <button class="ex-btn ex-btn-check" onclick="examCheckAddr()">Controleer (${totalInputs} velden)</button>
        <button class="ex-btn ex-btn-show" onclick="examShowAddr()">Toon antwoorden</button>
        <button class="ex-btn ex-btn-reset" onclick="examResetAddr()">Reset</button>
        <span class="ex-addr-score" id="ex-addr-score">0/${totalInputs}</span>
      </div>
    </div>`;
}

function examAllInputs(){
  return document.querySelectorAll('#ex-phase1-area .ex-addr-input');
}

function examCheckAddr(){
  let correct=0, total=0;
  examAllInputs().forEach(inp=>{
    total++;
    const val=inp.value.trim().toLowerCase();
    const ans=inp.dataset.answer.trim().toLowerCase();
    inp.classList.remove('correct','wrong');
    if(val===ans){ inp.classList.add('correct'); correct++; }
    else if(val) inp.classList.add('wrong');
  });
  document.getElementById('ex-addr-score').textContent=`${correct}/${total}`;
  if(correct===total && total>0){
    examPhase=2;
    examUpdatePhaseBar();
    examUpdateInstructions();
    examRenderPhase2();
    const sp=document.getElementById('ex-score-panel');
    sp.innerHTML=`Adrestabel volledig correct! CLI router unlockt. →`;
    sp.className='exam-score-panel pass';
    sp.style.display='block';
  }
}

function examShowAddr(){
  examAllInputs().forEach(inp=>{
    inp.value=inp.dataset.answer;
    inp.classList.remove('wrong'); inp.classList.add('correct');
  });
  const inputs=examAllInputs();
  document.getElementById('ex-addr-score').textContent=`${inputs.length}/${inputs.length}`;
}

function examResetAddr(){
  examAllInputs().forEach(inp=>{ inp.value=''; inp.classList.remove('correct','wrong'); });
  document.getElementById('ex-addr-score').textContent=`0/${examAllInputs().length}`;
}

// ── Phase 2 & 3: mini-CLI ──
function examRenderCLI(phase){
  const isRouter = phase===2;
  const deviceId = isRouter ? 'ex-phase2-area' : 'ex-phase3-area';
  const steps    = isRouter ? exRouterSteps : exSwitchSteps;
  const done     = isRouter ? exRouterDone  : exSwitchDone;
  const name     = isRouter ? examVariant.rName : examVariant.sName;
  const total    = steps.length;
  const doneN    = done.size;

  document.getElementById('ex-phase1-area').style.display= phase===1 ? '' : 'none';
  document.getElementById('ex-phase2-area').style.display= phase===2 ? '' : 'none';
  document.getElementById('ex-phase3-area').style.display= phase===3 ? '' : 'none';

  const area=document.getElementById(deviceId);
  area.innerHTML=`
    <div class="ex-cli-wrap">
      <div class="ex-cli-header">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <div>
            <div class="ex-cli-title">${isRouter?'Router':'Switch'} CLI — ${name}</div>
            <div class="ex-cli-desc">${isRouter?'Volledige router configuratie incl. SSH en dual-stack interfaces.':'Switch SVI, default gateway en Telnet VTY.'}</div>
          </div>
          <div style="margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <span class="ex-cli-progress"><span id="ex-cli-done-${phase}">${doneN}</span> / ${total}</span>
            <div style="display:flex;gap:5px">
              <button class="tbtn tbtn-check" onclick="examCLICheck(${phase})">check</button>
              <button class="tbtn tbtn-hint" onclick="examCLIHint(${phase})">hint</button>
              <button class="tbtn tbtn-reset" onclick="examCLIReset(${phase})">reset</button>
            </div>
          </div>
        </div>
        <div id="ex-cli-feedback-${phase}" style="margin-top:6px;font-size:11px;font-family:var(--mono);display:none;padding:6px 8px;border-radius:4px"></div>
      </div>
      <div class="terminal-wrap" id="ex-term-${phase}" style="flex:1;overflow-y:auto;padding:12px 16px;background:var(--term-bg);font-family:var(--mono);font-size:13px;line-height:1.85;min-height:0">
        <div class="line-sys">--- ${isRouter?'Router':'Switch'}: ${name} ---</div>
      </div>
      <div class="input-area" id="ex-input-area-${phase}">
        <span class="input-prompt" id="ex-prompt-${phase}">${name}> </span>
        <input class="input-field" id="ex-input-${phase}" placeholder="" autocomplete="off" spellcheck="false"
          onkeydown="examCLIKey(event,${phase})"
          oninput="examCLITabComplete(event,${phase})">
      </div>
    </div>`;
  document.getElementById(`ex-input-${phase}`).focus();
}

function examRenderPhase2(){
  examRenderCLI(2);
}
function examRenderPhase3(){
  examRenderCLI(3);
}

function examCLIPrompt(mode, steps, done, name, phase){
  const hostname = done.has('hostname') ? name : (phase===2 ? 'Router' : 'Switch');
  const modeMap = {
    'exec': '>',
    'priv': '#',
    'config': '(config)#',
    'config-line-con': '(config-line)#',
    'config-line-vty': '(config-line)#',
    'config-if-g000': '(config-if)#',
    'config-if-g001': '(config-if)#',
    'config-if-vlan': '(config-if)#',
    'rsa-prompt': '(config)#',
  };
  return hostname + (modeMap[mode] || '#') + ' ';
}

function examGetState(phase){
  if(phase===2) return {steps:exRouterSteps, done:exRouterDone, mode:exRouterMode, history:exRouterHistory};
  return {steps:exSwitchSteps, done:exSwitchDone, mode:exSwitchMode, history:exSwitchHistory};
}
function examSetMode(phase, mode){
  if(phase===2) exRouterMode=mode; else exSwitchMode=mode;
}

function examCLIKey(e, phase){
  if(e.key==='Enter'){
    const inp=document.getElementById(`ex-input-${phase}`);
    const val=inp.value.trim();
    if(!val){inp.value='';return;}
    inp.value='';
    examCLIProcess(val, phase);
  }
  if(e.key==='Tab'){
    e.preventDefault();
    examCLIDoTab(phase);
  }
}

function examCLIProcess(val, phase){
  const {steps,done,mode,history}=examGetState(phase);
  const name=phase===2?examVariant.rName:examVariant.sName;
  const term=document.getElementById(`ex-term-${phase}`);
  const promptStr=examCLIPrompt(mode,steps,done,name,phase);

  // Append prompt + command
  const pl=document.createElement('div');
  pl.innerHTML=`<span class="line-prompt">${promptStr}</span><span class="line-cmd">${val}</span>`;
  term.appendChild(pl);

  // Special: exit moves up one mode level
  if(/^exit$/i.test(val)){
    const modeParent={'config-line-con':'config','config-line-vty':'config','config-if-g000':'config','config-if-g001':'config','config-if-vlan':'config','config':'priv','priv':'exec'};
    // Find exit step
    const exitStep=steps.find(s=>s.id==='conexit'||s.id==='vtyexit'||s.id==='exitg00'||s.id==='exitg01'||s.id==='exitvlan'||s.id==='vtyexit');
    // Try to match any exit step in current mode
    const matchedExit=steps.find(s=>/^exit$/i.test(s.cmd)&&s.mode===mode&&!done.has(s.id));
    if(matchedExit){
      done.add(matchedExit.id);
      if(matchedExit.set) examSetMode(phase,matchedExit.set);
      const ol=document.createElement('div'); ol.className='line-ok'; ol.textContent=matchedExit.ok; term.appendChild(ol);
      examUpdateCLICounter(phase,steps,done);
    } else {
      // Generic exit
      const parent=modeParent[mode];
      if(parent){ examSetMode(phase,parent); }
    }
    examCLIUpdatePrompt(phase,steps,done,name);
    term.scrollTop=term.scrollHeight;
    return;
  }

  // end command
  if(/^end$/i.test(val)){
    const endStep=steps.find(s=>s.id==='end'&&!done.has(s.id));
    if(endStep && done.has('conf_t')){
      done.add('end'); examSetMode(phase,'priv');
      const ol=document.createElement('div'); ol.className='line-ok'; ol.textContent=endStep.ok; term.appendChild(ol);
      examUpdateCLICounter(phase,steps,done);
    } else {
      examSetMode(phase,'priv');
    }
    examCLIUpdatePrompt(phase,steps,done,name);
    term.scrollTop=term.scrollHeight;
    return;
  }

  // RSA prompt: show key-gen text
  if(mode==='rsa-prompt'){
    if(/^1024$/.test(val)){
      const rsaStep=steps.find(s=>s.id==='rsabits'&&!done.has(s.id));
      if(rsaStep){
        done.add('rsabits'); examSetMode(phase,'config');
        const ol=document.createElement('div'); ol.className='line-ok'; ol.textContent=rsaStep.ok; term.appendChild(ol);
        const sl=document.createElement('div'); sl.className='line-sys'; sl.textContent='% Generating 1024 bit RSA keys, keys will be non-exportable...OK'; term.appendChild(sl);
        examUpdateCLICounter(phase,steps,done);
      }
    } else {
      const el=document.createElement('div'); el.className='line-err'; el.textContent='% Invalid input. Enter the modulus size (e.g. 1024).'; term.appendChild(el);
    }
    examCLIUpdatePrompt(phase,steps,done,name);
    term.scrollTop=term.scrollHeight;
    return;
  }

  // Match a step
  const matched=steps.find(s=>{
    if(done.has(s.id)) return false;
    if(s.mode!==mode) return false;
    return s.m.test(val);
  });

  if(matched){
    // Check requirements
    const missingReq=matched.req.filter(r=>!done.has(r));
    if(missingReq.length>0){
      const el=document.createElement('div'); el.className='line-err';
      el.textContent=`% Command not allowed here. Missing prerequisite.`; term.appendChild(el);
    } else {
      done.add(matched.id);
      if(matched.set) examSetMode(phase,matched.set);
      // RSA prompt: show IOS text
      if(matched.set==='rsa-prompt'){
        const rl=document.createElement('div'); rl.className='line-info';
        rl.textContent=`The name for the keys will be: ${phase===2?examVariant.rName:'Switch'}.${phase===2?examVariant.domain:'local'}`; term.appendChild(rl);
        const rl2=document.createElement('div'); rl2.className='line-info';
        rl2.textContent='How many bits in the modulus [512]: '; term.appendChild(rl2);
      }
      const ol=document.createElement('div'); ol.className='line-ok'; ol.textContent=matched.ok; term.appendChild(ol);
      // Syslog for no shutdown
      if(/^no\s+shut/i.test(val)){
        const sl=document.createElement('div'); sl.className='line-sys';
        sl.textContent=`%LINK-5-CHANGED: Interface ${mode.includes('g000')?'GigabitEthernet0/0':mode.includes('g001')?'GigabitEthernet0/1':'Vlan1'}, changed state to up`; term.appendChild(sl);
      }
      examUpdateCLICounter(phase,steps,done);
      // Check completion
      if(done.has('save')){
        setTimeout(()=>examCLIComplete(phase),300);
      }
    }
  } else if(done.has(steps.find(s=>s.m.test(val)&&s.mode===mode)?.id||'')){
    // Already done
    const al=document.createElement('div'); al.className='line-sys'; al.textContent='(Already configured)'; term.appendChild(al);
  } else {
    const el=document.createElement('div'); el.className='line-err';
    el.textContent=`% Invalid input detected at '^' marker.`; term.appendChild(el);
  }

  examCLIUpdatePrompt(phase,steps,done,name);
  term.scrollTop=term.scrollHeight;
}

function examUpdateCLICounter(phase,steps,done){
  const el=document.getElementById(`ex-cli-done-${phase}`);
  if(el) el.textContent=done.size;
}

function examCLIUpdatePrompt(phase,steps,done,name){
  const mode=phase===2?exRouterMode:exSwitchMode;
  document.getElementById(`ex-prompt-${phase}`).textContent=examCLIPrompt(mode,steps,done,name,phase);
}

function examCLICheck(phase){
  const {steps,done}=examGetState(phase);
  const missing=steps.filter(s=>!done.has(s.id));
  const fb=document.getElementById(`ex-cli-feedback-${phase}`);
  if(missing.length===0){
    fb.style.display='block'; fb.style.background='var(--green-bg)'; fb.style.color='var(--green)'; fb.style.borderLeft='3px solid var(--green)';
    fb.textContent='All steps complete! ✓';
  } else {
    fb.style.display='block'; fb.style.background='#fffbeb'; fb.style.color='#92400e'; fb.style.borderLeft='3px solid #f59e0b';
    fb.textContent=`Missing ${missing.length} step(s): ${missing.slice(0,3).map(s=>s.cmd).join(' · ')}${missing.length>3?' …':''}`;
  }
}

function examCLIHint(phase){
  const {steps,done,mode}=examGetState(phase);
  const next=steps.find(s=>!done.has(s.id));
  const fb=document.getElementById(`ex-cli-feedback-${phase}`);
  if(next){
    fb.style.display='block'; fb.style.background='#eff6ff'; fb.style.color='#1d4ed8'; fb.style.borderLeft='3px solid #3b82f6';
    fb.textContent=`Next: ${next.cmd}  (mode: ${next.mode})`;
  }
}

function examCLIReset(phase){
  if(phase===2){ exRouterDone=new Set(); exRouterMode='exec'; }
  else { exSwitchDone=new Set(); exSwitchMode='exec'; }
  examRenderCLI(phase);
}

function examCLIDoTab(phase){
  // Simple tab completion — show next expected command
  const inp=document.getElementById(`ex-input-${phase}`);
  const val=inp.value.trim();
  const {steps,done,mode}=examGetState(phase);
  const match=steps.find(s=>!done.has(s.id)&&s.mode===mode&&s.cmd.startsWith(val)&&val.length>0);
  if(match) inp.value=match.cmd;
}

function examCLITabComplete(e,phase){}  // handled in keydown

function examCLIComplete(phase){
  const fb=document.getElementById(`ex-cli-feedback-${phase}`);
  fb.style.display='block'; fb.style.background='var(--green-bg)'; fb.style.color='var(--green)'; fb.style.borderLeft='3px solid var(--green)';
  if(phase===2){
    fb.textContent='Router configuratie voltooid! Switch CLI unlockt nu →';
    examPhase=3;
    examUpdatePhaseBar();
    examUpdateInstructions();
    setTimeout(()=>examRenderPhase3(),600);
  } else {
    fb.textContent='Examen voltooid! Router + Switch geconfigureerd ✓';
    examPhase=3;
    examUpdatePhaseBar();
    const sp=document.getElementById('ex-score-panel');
    sp.innerHTML='Beide apparaten geconfigureerd. Druk ↻ voor een nieuwe variant.';
    sp.className='exam-score-panel pass'; sp.style.display='block';
  }
}

// Init exam tab when switched to
const _origSwitchTab = switchTab;
// We'll call examInit on first switch
let examInitDone=false;
function examInit(){
  if(examInitDone) return;
  examInitDone=true;
  examNew();
}

cliBuildSidebar(); cliLoad(0);
addrBuildSidebar(); addrLoad(0);

</script>

          <div class="ex-phase active" id="ex-phase-1">
            <span class="ex-phase-num">1</span>
            <span class="ex-phase-label">Adrestabel</span>
          </div>

          <div class="ex-phase" id="ex-phase-2">

            <span class="ex-phase-label">Router</span>
          </div>
          <div class="ex-phase-arrow">→</div>

            <span class="ex-phase-num">3</span>
            <span class="ex-phase-label">Switch</span>
          </div>

        <div id="ex-instructions" class="exam-instructions"></div>
        <div id="ex-score-panel" class="exam-score-panel" style="display:none"></div>

      <!-- Right: active work area -->
      <div class="exam-work-area" id="ex-work-area">

        <div id="ex-phase1-area"></div>

        <div id="ex-phase2-area" style="display:none"></div>
