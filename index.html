<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA 1 Praktijk Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0e14; --surface: #0d1117; --surface2: #161b22; --surface3: #21262d;
  --border: #30363d; --text: #e6edf3; --text-muted: #7d8590; --text-dim: #484f58;
  --green: #3fb950; --green-bg: #0d2b12; --red: #f85149; --red-bg: #2d0f0e;
  --yellow: #d29922; --blue: #79c0ff; --prompt: #a5d6ff; --accent: #58a6ff;
  --mono: 'JetBrains Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  --sidebar-w: 270px;
}
html { background: #060a0f; color: var(--text); font-family: var(--sans); }
body { height: 100vh; display: flex; flex-direction: column; align-items: center; background: #060a0f; overflow: hidden; }
.page-shell { width: 100%; max-width: 1600px; display: flex; flex-direction: column; height: 100vh; box-shadow: 0 0 80px rgba(0,0,0,0.8); margin: 24px 0 40px; border-radius: 10px; overflow: hidden; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; align-items: stretch; flex-shrink: 0; position: sticky; top: 0; z-index: 20; }
.topbar-brand { display: flex; align-items: center; gap: 8px; padding: 10px 0; margin-right: 16px; }
.logo { width: 26px; height: 26px; background: var(--accent); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 9px; font-weight: 500; color: #0a0e14; flex-shrink: 0; }
.brand-title { font-size: 15px; font-weight: 600; white-space: nowrap; }
.tabs { display: flex; align-items: stretch; }
.tab-btn { background: transparent; border: none; border-bottom: 2px solid transparent; padding: 0 14px; cursor: pointer; font-family: var(--sans); font-size: 14px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-icon { width: 18px; height: 18px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 9px; font-weight: 500; flex-shrink: 0; }
.topbar-right { margin-left: auto; display: flex; align-items: center; }
.topbar-sub { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
.tab-panel { display: none; flex: 1; }
.tab-panel.active { display: flex; flex-direction: column; flex: 1; min-height: 0; }
.app-layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 10px 0; overflow-y: auto; }
.sb-section { padding: 0 8px; margin-bottom: 14px; }
.sb-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); padding: 0 8px; margin-bottom: 3px; }
.scen-btn { width: 100%; text-align: left; background: transparent; border: none; border-radius: 5px; padding: 8px 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.1s; margin-bottom: 1px; }
.scen-btn:hover { background: var(--surface2); }
.scen-btn.active { background: var(--surface3); }
.scen-icon { width: 26px; height: 26px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; font-family: var(--mono); font-weight: 500; line-height: 1.2; text-align: center; }
.scen-text { flex: 1; min-width: 0; }
.scen-name { font-size: 14px; font-weight: 500; color: var(--text); display: block; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.scen-type { font-size: 12px; color: var(--text-muted); display: block; }
.scen-badge { font-size: 11px; font-family: var(--mono); color: var(--text-dim); background: var(--surface3); padding: 1px 4px; border-radius: 3px; border: 1px solid var(--border); flex-shrink: 0; }
.scen-btn.active .scen-badge { color: var(--accent); border-color: var(--accent); }
.prog-mini { height: 2px; background: var(--surface3); border-radius: 1px; margin-top: 3px; overflow: hidden; }
.prog-mini-fill { height: 100%; background: var(--green); border-radius: 1px; transition: width 0.4s; }
.mobile-select-wrap { display: none; padding: 8px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.mobile-select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: var(--sans); font-size: 12px; padding: 6px 10px; outline: none; cursor: pointer; }
.mobile-select:focus { border-color: var(--accent); }
.info-panel { width: 220px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.ip-section { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
.ip-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 8px; }
.ip-progress-bar { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.ip-progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s ease; }
.ip-count { font-family: var(--mono); font-size: 13px; color: var(--text); font-weight: 500; }
.ip-count span { color: var(--green); }
.ip-mode { font-family: var(--mono); font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.ip-mode-val { color: var(--accent); }
.ip-feedback { flex: 1; padding: 12px 14px; overflow-y: auto; }
.ip-feedback-msg { font-size: 12px; line-height: 1.6; color: var(--text-muted); transition: opacity 0.6s ease; }
.ip-feedback-msg.ok { color: var(--green); }
.ip-feedback-msg.err { color: var(--red); }
.ip-feedback-msg.warn { color: var(--yellow); }
.ip-feedback-msg.info { color: var(--blue); }
.ip-feedback-msg.fade { opacity: 0.35; }
.ip-stuck { margin: 0 14px 14px; }
.ip-stuck-btn { width: 100%; font-family: var(--sans); font-size: 12px; font-weight: 600; padding: 8px 12px; border-radius: 5px; border: 1px solid #5a4a10; background: #2a2000; color: #d29922; cursor: pointer; transition: all 0.15s; text-align: left; display: flex; align-items: center; justify-content: space-between; }
.ip-stuck-btn:hover { border-color: var(--yellow); background: #3a2e00; color: #f0b030; }
.ip-stuck-btn.used { border-color: var(--red); background: var(--red-bg); color: var(--red); opacity: 0.9; }
.ip-stuck-content { display: none; margin-top: 6px; padding: 8px 10px; background: var(--surface2); border-radius: 5px; border: 1px solid var(--border); font-family: var(--mono); font-size: 12px; color: var(--yellow); line-height: 1.5; }
.ip-stuck-content.show { display: block; }
.cli-main { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-width: 0; }
.terminal-chrome { background: var(--surface); border-bottom: 1px solid var(--border); padding: 6px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }

.terminal-chrome-actions { display: flex; gap: 6px; }
.scenario-info-card { background: #f5f5f0; border-bottom: 2px solid #c8c8c0; padding: 14px 18px 12px; flex-shrink: 0; overflow-y: auto; max-height: 45vh; }
.sic-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.sh-badge { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; margin-top: 2px; font-family: var(--mono); }
.sh-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; flex: 1; }
.scenario-info-card .sh-desc { color: #444; }
.scenario-info-card .sh-progress { color: #666; }
.scenario-info-card .sh-progress span { color: #1a7a1a; }
.sh-progress { font-size: 13px; font-family: var(--mono); color: var(--text-muted); flex-shrink: 0; margin-top: 2px; white-space: nowrap; }
.sh-progress span { color: var(--green); font-weight: 500; }
.scenario-brief { margin-top: 8px; font-size: 12px; line-height: 1.7; color: var(--text-muted); }
.scenario-brief p { margin-bottom: 4px; }
.scenario-brief .sb-item-note .sb-item-note .addr-table-wrap { margin-top: 10px; overflow-x: auto; }
.addr-table { border-collapse: collapse; font-size: 11px; font-family: var(--mono); width: 100%; border: 1px solid #bbb; }
.addr-table th { background: #e8e8e2; color: #333; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; padding: 5px 10px; text-align: left; border-bottom: 1px solid #bbb; border-right: 1px solid #ccc; white-space: nowrap; }
.addr-table td { padding: 4px 10px; border-bottom: 1px solid #ddd; border-right: 1px solid #ddd; color: #333; white-space: nowrap; }
.addr-table td.val { color: #1a4a8a; font-weight: 500; }
.addr-table td.val-warn { color: #8a5a00; font-weight: 500; }
.addr-table tr:last-child td { border-bottom: none; }
.addr-table tr:nth-child(even) td { background: #f0f0ea; }
.scenario-text { font-size: 11px; color: #444; line-height: 1.6; margin-top: 8px; padding-top: 8px; border-top: 1px solid #ccc; }
.topology-wrap { margin-bottom: 10px; }
.topology-wrap svg { max-width: 100%; height: auto; }
.addr-topology { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 8px; margin-bottom: 10px; }
.addr-topology svg { background: transparent; }
.cli-main-wrapper { position: relative; flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.terminal-wrap { flex: 1; overflow-y: auto; padding: 16px 20px 4px; background: var(--bg); }
.terminal-output { font-family: var(--mono); font-size: 14px; line-height: 1.85; }
.line-prompt { color: var(--prompt); }
.line-cmd { color: var(--text); }
.line-ok { color: var(--green); } .line-ok::before { content: '  '; }
.line-err { color: var(--red); } .line-err::before { content: '  '; }
.line-warn { color: var(--yellow); } .line-warn::before { content: '  '; }
.line-info { color: var(--blue); } .line-info::before { content: '  '; }
.line-help { color: var(--text-muted); font-size: 11px; } .line-help::before { content: '  '; }
.line-sys { color: var(--text-dim); font-style: italic; }
.line-blank { height: 4px; display: block; }
.input-area { background: var(--bg); padding: 0 20px 16px; display: flex; align-items: center; gap: 0; flex-shrink: 0; }
.input-prompt { font-family: var(--mono); font-size: 14px; color: var(--prompt); white-space: nowrap; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; }
.input-field { flex: 1; background: transparent; border: none; outline: none; font-family: var(--mono); font-size: 14px; color: var(--text); caret-color: var(--green); min-width: 0; }
.input-field::placeholder { color: #2d3540; font-size: 12px; }
.input-field:disabled { opacity: 0.3; }
.btn-sm { font-family: var(--sans); font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); cursor: pointer; transition: all 0.1s; white-space: nowrap; }
.btn-hint:hover { border-color: var(--yellow); color: var(--yellow); background: #1a1800; }
.btn-check:hover { border-color: var(--accent); color: var(--accent); background: #0d1a2a; }
.btn-sreset:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.completion { display: none; position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; }
.completion.show { display: block; }
.completion-bar { background: #0d2b12; border-top: 2px solid var(--green); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.cb-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.cb-icon { color: var(--green); font-size: 16px; flex-shrink: 0; }
.cb-title { font-size: 13px; font-weight: 600; color: var(--green); white-space: nowrap; }
.cb-stats { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
.cb-right { display: flex; gap: 8px; flex-shrink: 0; }
.cc-btn { font-family: var(--sans); font-size: 11px; font-weight: 500; padding: 5px 14px; border-radius: 5px; border: 1px solid var(--green); background: var(--green-bg); color: var(--green); cursor: pointer; transition: all 0.1s; }
.cc-btn:hover { background: var(--green); color: var(--bg); }
.cc-btn-sec { border-color: var(--border); background: transparent; color: var(--text-muted); }
.cc-btn-sec:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
.addr-main { flex: 1; overflow-y: auto; padding: 16px; min-width: 0; }
.scenario-info h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.scenario-info p { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }

.legend { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-muted); }
.legend-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
.result-banner { padding: 9px 12px; border-radius: 5px; margin-bottom: 12px; display: none; align-items: center; gap: 10px; }
.result-banner.show { display: flex; }
.result-banner.pass { background: var(--green-bg); border: 1px solid var(--green); }
.result-banner.fail { background: var(--red-bg); border: 1px solid var(--red); }
.rb-score { font-family: var(--mono); font-size: 16px; font-weight: 500; }
.result-banner.pass .rb-score { color: var(--green); }
.result-banner.fail .rb-score { color: var(--red); }
.rb-msg { font-size: 11px; color: var(--text-muted); }
.addr-actions { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.abtn { font-family: var(--sans); font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.1s; }
.abtn:hover { background: var(--surface2); color: var(--text); }
.abtn-check { border-color: var(--green); color: var(--green); } .abtn-check:hover { background: var(--green-bg); }
.abtn-reveal { border-color: var(--accent); color: var(--accent); } .abtn-reveal:hover { background: rgba(88,166,255,0.08); }
.abtn-reset { border-color: var(--red); color: var(--red); } .abtn-reset:hover { background: var(--red-bg); }
.score-display { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
.score-display span { color: var(--green); font-weight: 500; }
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th { background: var(--surface2); color: var(--text-muted); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; padding: 7px 8px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr.divider-row { border-bottom: none; }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 4px 6px; vertical-align: middle; }
.td-device { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 500; white-space: nowrap; }
.td-iface { font-family: var(--mono); font-size: 10px; color: var(--text-muted); white-space: nowrap; }
.td-type-ipv4 { font-size: 9px; color: var(--accent); font-family: var(--mono); white-space: nowrap; }
.td-type-ipv6 { font-size: 9px; color: var(--green); font-family: var(--mono); white-space: nowrap; }
.td-type-ll { font-size: 9px; color: var(--yellow); font-family: var(--mono); white-space: nowrap; }
.cell-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 4px 8px; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; transition: border-color 0.1s; min-width: 100px; }
.cell-input:focus { border-color: var(--accent); }
.cell-input.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
.cell-input.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }
.cell-input.revealed { border-color: var(--yellow); background: #271e05; color: var(--yellow); }
.cell-static { font-family: var(--mono); font-size: 11px; color: var(--text-muted); padding: 3px 2px; }
.cell-given { font-family: var(--mono); font-size: 11px; color: var(--text-dim); padding: 3px 2px; font-style: italic; }
.cell-na { font-family: var(--mono); font-size: 10px; color: var(--text-dim); padding: 3px 2px; }
.divider-line { height: 1px; background: var(--surface3); margin: 1px 0; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
@media (max-width: 768px) {
  .sidebar { display: none; }
  .mobile-select-wrap { display: block; }
  .app-layout { height: auto; overflow: visible; }
  .tab-panel.active { height: auto; }
  .cli-main { height: auto; overflow: visible; }
  .cli-main-wrapper { height: auto; overflow: visible; position: static; }
  .terminal-wrap { height: 280px; overflow-y: auto; }
  .topbar-sub { display: none; }
  .sh-desc { display: none; }
  .addr-main { overflow: visible; }
  .cell-input { min-width: 80px; }
  .vars-grid { display: none; }
}
@media (max-width: 480px) {
  .tab-btn { padding: 0 10px; font-size: 11px; }
  .terminal-wrap { height: 240px; }
  .input-prompt { max-width: 35%; font-size: 11px; }
  .input-field { font-size: 11px; }
  .terminal-output { font-size: 11px; }
}

.hint-collapsible { margin-bottom: 12px; }
.hint-toggle { background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; font-family: var(--sans); font-size: 11px; color: var(--text-dim); cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 5px; }
.hint-toggle:hover { border-color: var(--yellow); color: var(--yellow); }
.hint-collapsible.open .hint-toggle { color: var(--yellow); border-color: var(--yellow); }
.ht-icon { transition: transform 0.15s; display: inline-block; }
.hint-collapsible.open .ht-icon { transform: rotate(90deg); }
.hint-content { display: none; margin-top: 6px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--yellow); border-radius: 5px; padding: 9px 12px; font-size: 11px; color: var(--text-muted); line-height: 1.6; }
.hint-collapsible.open .hint-content { display: block; }
.hint-content strong { color: var(--yellow); font-weight: 500; }
.network-banner { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 5px; padding: 8px 12px; margin-bottom: 10px; flex-wrap: wrap; }
.nb-label { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
.nb-val { font-size: 13px; color: var(--accent); font-family: var(--mono); font-weight: 500; }
.nb-sep { color: var(--text-dim); font-size: 11px; margin: 0 2px; }
.nb-sub { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
</style>
</head>
<body>
<div class="page-shell">
<div class="topbar">
  <div class="topbar-brand">
    <div class="logo">IOS</div>
    <span class="brand-title">CCNA 1 Trainer</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('cli')" id="tab-cli">
      <div class="tab-icon" style="background:#1f4b7a;color:#79c0ff">CLI</div>CLI
    </button>
    <button class="tab-btn" onclick="switchTab('addr')" id="tab-addr">
      <div class="tab-icon" style="background:#1a3a1a;color:#3fb950">ADR</div>Adrestabel
    </button>
  </div>
  <div class="topbar-right"><span class="topbar-sub">CCNA 1 v7.0 — PTSA</span></div>
</div>

<div class="tab-panel active" id="panel-cli">
  <div class="mobile-select-wrap">
    <select class="mobile-select" id="cli-mobile-select" onchange="cliLoad(parseInt(this.value))"></select>
  </div>
  <div class="app-layout">
    <div class="sidebar">
      <div class="sb-section">
        <div class="sb-label">Full setup</div>
        <div id="cli-sb-full"></div>
      </div>
      <div class="sb-section">
        <div class="sb-label">Partial scenarios</div>
        <div id="cli-sb-partial"></div>
      </div>
    </div>
    <div class="cli-main">
      <div class="scenario-info-card">
        <div class="sic-top">
          <div class="sh-badge" id="cli-sh-badge"></div>
          <div class="sh-desc" id="cli-sh-desc"></div>
          <div class="sh-progress" id="cli-sh-progress"></div>
        </div>
        <div class="scenario-brief" id="cli-vars-grid"></div>
      </div>
      <div class="cli-main-wrapper">
        <div class="terminal-chrome">
          <div class="terminal-chrome-title">IOS CLI Simulator</div>
          <div class="terminal-chrome-actions">
            <button class="btn-sm" style="border-color:#2a6a9a;background:#0d2a40;color:#58a6ff" onclick="cliCheckProgress()" title="Show what is still missing">check</button>
            <button class="btn-sm" style="border-color:#7a6010;background:#2a2000;color:#d29922" onclick="cliShowHint()">hint</button>
            <button class="btn-sm" style="border-color:#6a1a1a;background:#2a0a0a;color:#f85149" onclick="cliReset()">reset</button>
          </div>
        </div>
        <div class="terminal-wrap" id="cli-terminal-wrap">
          <div class="terminal-output" id="cli-output"></div>
        </div>

function getModeKey(mode){
  if(!mode) return 'config';
  if(mode==='exec') return 'exec';
  if(mode==='priv') return 'priv';
  if(mode==='rsa-prompt') return 'rsa-prompt';
  if(mode.startsWith('config-if')||mode.startsWith('config-if')) return 'config-if';
  if(mode.startsWith('config-line')) return 'config-line';
  return 'config';
}

function tryTab(val){
  if(!val.trim()) return null;
  const parts = val.trimEnd().split(' ');
  const lastWord = parts[parts.length-1].toLowerCase();
  if(!lastWord) return null;

  const modeKey = getModeKey(typeof cliMode !== 'undefined' ? cliMode : 'config');

  // Single word: use mode completions
  if(parts.length===1){
    const modeMap = MODE_COMPLETIONS[modeKey] || MODE_COMPLETIONS.config;
    if(modeMap[lastWord] && modeMap[lastWord] !== lastWord){
      return modeMap[lastWord];
    }
    // Find unique prefix match in mode
    const matches = Object.entries(modeMap).filter(([k])=>k.startsWith(lastWord)&&k!==lastWord);
    const vals = [...new Set(matches.map(([,v])=>v))];
    if(vals.length===1) return vals[0];
    if(vals.length>1){
      // Ambiguous
      const out=document.getElementById('cli-output');
      if(out){
        const d=document.createElement('div');
        d.style.cssText='font-family:var(--mono);font-size:13px;color:#484f58;padding-left:4px';
        d.textContent='% Ambiguous command: '+[...new Set(matches.map(([,v])=>v))].slice(0,6).join('  ');
        out.appendChild(d);
        const tw=document.getElementById('cli-terminal-wrap'); if(tw) tw.scrollTop=99999;
      }
    }
    return null;
  }

  // Multi word: use subcommand completions
  // Try progressively shorter prefixes
  for(let i=parts.length-1; i>=1; i--){
    const prefix = parts.slice(0,i).join(' ').toLowerCase();
    const subMap = SUBWORD_COMPLETIONS[prefix];
    if(subMap){
      const match = subMap[lastWord];
      if(match && match !== lastWord){
        const result = parts.slice(0,i).join(' ')+' '+match;
        return result;
      }
      // Prefix match
      const matches = Object.entries(subMap).filter(([k])=>k.startsWith(lastWord)&&k!==lastWord);
      const vals = [...new Set(matches.map(([,v])=>v))];
      if(vals.length===1){
        return parts.slice(0,i).join(' ')+' '+vals[0];
      }
      if(vals.length>1){
        const out=document.getElementById('cli-output');
        if(out){
          const d=document.createElement('div');
          d.style.cssText='font-family:var(--mono);font-size:13px;color:#484f58;padding-left:4px';
          d.textContent='% Ambiguous: '+vals.slice(0,6).join('  ');
          out.appendChild(d);
          const tw=document.getElementById('cli-terminal-wrap'); if(tw) tw.scrollTop=99999;
        }
        return null;
      }
    }
  }
  return null;
}

// ── CLI STATE ──
let cliCur=0, cliMode='exec', cliDone=new Set(), cliProgress={};

function promptForMode(mode, sc){
  // Use hostname from vars only after hostname step is done
  // For full scenarios, default to Router/Switch until hostname is configured
  let h = 'Router';
  if(sc.group === 'partial'){
    // Partial scenarios start with hostname already set
    const hn = sc.vars&&sc.vars.find(v=>v.k==='Hostname');
    if(hn) h = hn.v;
    else if(sc.tag&&sc.tag.includes('SVI')) h = 'Switch';
    else if(sc.tag&&sc.tag.includes('PORT')) h = 'Switch';
    else if(sc.id===5||sc.id===6) h = 'Switch';
    else if(sc.tag&&sc.tag.includes('VTY')&&sc.type&&sc.type.includes('switch')) h = 'Switch';
    else h = 'Router';
  } else {
    // Full scenarios: only show hostname after hostname step is done
    if(cliDone.has('hostname')){
      const hn = sc.vars&&sc.vars.find(v=>v.k==='Hostname');
      h = hn ? hn.v : 'Router';
    } else {
      // Use device default name based on scenario
      h = sc.id === 1 ? 'Switch' : 'Router';
    }
  }
  if(mode==='exec') return h+'>';
  if(mode==='priv') return h+'#';
  if(mode==='config') return h+'(config)#';
  if(mode==='rsa-prompt') return 'How many bits in the modulus [512]:';
  if(mode&&mode.startsWith('config-if')) return h+'(config-if)#';
  if(mode&&mode.startsWith('config-line')) return h+'(config-line)#';
  return h+'#';
}

function cliBuildSidebar(){
  const full=document.getElementById('cli-sb-full'), partial=document.getElementById('cli-sb-partial');
  const sel=document.getElementById('cli-mobile-select');
  const gF=document.createElement('optgroup'); gF.label='Full setup';
  const gP=document.createElement('optgroup'); gP.label="Partial scenarios";
  SCEN.forEach(sc=>{
    const btn=document.createElement('button');
    btn.className='scen-btn'+(sc.id===0?' active':'');
    btn.id='cli-btn-'+sc.id; btn.onclick=()=>cliLoad(sc.id);
    const done=cliProgress[sc.id]||0, total=sc.steps.length, pct=Math.round(done/total*100);
    btn.innerHTML=`<div class="scen-icon" style="background:${sc.tagColor};color:${sc.tagText}">${sc.tag.slice(0,3)}</div>
      <div class="scen-text"><span class="scen-name">${sc.name}</span><span class="scen-type">${sc.type}</span>
      <div class="prog-mini"><div class="prog-mini-fill" id="cprog-${sc.id}" style="width:${pct}%"></div></div></div>
      <span class="scen-badge" id="cbadge-${sc.id}">${done}/${total}</span>`;
    (sc.group==='full'?full:partial).appendChild(btn);
    const opt=document.createElement('option'); opt.value=sc.id; opt.textContent=sc.name;
    (sc.group==='full'?gF:gP).appendChild(opt);
  });
  sel.appendChild(gF); sel.appendChild(gP);
}

function cliSetPrompt(){
  const sc=SCEN[cliCur];
  const p=promptForMode(cliMode,sc);
  document.getElementById('cli-input-prompt').textContent=p+' ';
  document.getElementById('cli-cmd-input').disabled=false;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function cliAppend(type,text){
  const out=document.getElementById('cli-output');
  const div=document.createElement('div');
  if(type==='blank'){div.className='line-blank';}
  else if(type==='prompt-cmd'){div.innerHTML=`<span class="line-prompt">${esc(text.p)} </span><span class="line-cmd">${esc(text.cmd)}</span>`;}
  else{div.className='line-'+type; div.textContent=text;}
  out.appendChild(div);
  document.getElementById('cli-terminal-wrap').scrollTop=99999;
}

function modeOk(s){
  if(s.mode===cliMode) return true;
  if(s.mode&&s.mode.startsWith('config-if')) return cliMode===s.mode;
  if(s.mode&&s.mode.startsWith('config-line')) return cliMode===s.mode;
  return false;
}

function findMatchingStep(val, sc){
  // First look for undone matching step
  const undone = sc.steps.find(s=>{
    if(cliDone.has(s.id)) return false;
    if(!s.m.test(val.trim())) return false;
    if(!modeOk(s)) return false;
    return s.req.every(r=>cliDone.has(r));
  });
  if(undone) return undone;
  // Then look for already-done step that matches — accept silently like real IOS
  return sc.steps.find(s=>{
    if(!cliDone.has(s.id)) return false;
    if(!s.m.test(val.trim())) return false;
    return modeOk(s);
  }) ? {id:'__repeat__', m:/.*/, ok:null, req:[], mode:cliMode, repeat:true, set: sc.steps.find(s=>cliDone.has(s.id)&&s.m.test(val.trim())&&modeOk(s))?.set} : null;
}

// ── VALUE VALIDATION ──
function validateInput(val, step){
  // Returns a warning string if the value is syntactically valid but likely wrong, else null
  const v = val.trim();
  const sc = SCEN[cliCur];
  const vars = sc.vars || [];
  const getVar = (k) => { const e=vars.find(x=>x.k===k); return e?e.v:null; };

  // Hostname check
  if(/^hostname\s+\S+$/i.test(v)){
    const expected = getVar('Hostname');
    const given = v.split(/\s+/)[1];
    if(expected && given !== expected)
      return `Warning: hostname set to '${given}' but scenario expects '${expected}'. Case-sensitive — grader may mark incorrect.`;
  }

  // IP address check — compare against step's expected cmd
  if(/^ip\s+address\s+/.test(v) && step && step.cmd){
    const givenParts = v.toLowerCase().replace(/\s+/g,' ').trim();
    const expectedParts = step.cmd.toLowerCase().replace(/\s+/g,' ').trim();
    if(givenParts !== expectedParts)
      return `Warning: IP address '${v.split(/\s+/).slice(2).join(' ')}' does not match expected '${step.cmd.split(/\s+/).slice(2).join(' ')}'. Grader checks exact value.`;
  }

  // Username check
  if(/^username\s+/i.test(v) && step && step.cmd){
    const givenNorm = v.replace(/\s+/g,' ').trim();
    const expectedNorm = step.cmd.replace(/\s+/g,' ').trim();
    if(givenNorm.toLowerCase() !== expectedNorm.toLowerCase()){
      const givenUser = v.split(/\s+/)[1];
      const expUser = step.cmd.split(/\s+/)[1];
      const givenPw = v.split(/\s+/)[3];
      const expPw = step.cmd.split(/\s+/)[3];
      if(givenUser !== expUser) return `Warning: username '${givenUser}' expected '${expUser}'. Grader checks exact value.`;
      if(givenPw !== expPw) return `Warning: password '${givenPw}' expected '${expPw}'. Grader checks exact value.`;
    }
  }

  // Enable secret check
  if(/^enable\s+secret\s+/i.test(v) && step && step.cmd){
    const given = v.split(/\s+/)[2];
    const expected = step.cmd.split(/\s+/)[2];
    if(given && expected && given !== expected)
      return `Warning: enable secret '${given}' expected '${expected}'. Grader checks exact value.`;
  }

  // Domain name check
  if(/^ip\s+domain-name\s+/i.test(v) && step && step.cmd){
    const given = v.split(/\s+/)[2];
    const expected = step.cmd.split(/\s+/)[2];
    if(given && expected && given.toLowerCase() !== expected.toLowerCase())
      return `Warning: domain name '${given}' expected '${expected}'. Case-sensitive in Packet Tracer.`;
  }

  return null;
}

function findBlockedStep(val, sc){
  // Find a step that matches but is blocked by missing requirements
  return sc.steps.find(s=>{
    if(cliDone.has(s.id)) return false;
    if(!s.m.test(val.trim())) return false;
    return !s.req.every(r=>cliDone.has(r));
  });
}

function getMissingReqs(step, sc){
  const missing = step.req.filter(r=>!cliDone.has(r));
  return missing.map(r=>{
    const s=sc.steps.find(x=>x.id===r);
    return s ? s.cmd : r;
  });
}

function cliHandleInput(val){
  const sc=SCEN[cliCur];
  const p=promptForMode(cliMode,sc);
  cliAppend('prompt-cmd',{p,cmd:val});

  // ? help → IOS-style output in terminal, PTSA hints in panel
  if(val.trim()==='?' || val.trim().endsWith(' ?')){
    const lines=getHelp(cliMode, cliCur);
    const prefix = val.trim()==='?' ? '' : val.replace(/\s*\?$/,'').trim()+' ';
    // Filter by prefix if partial command before ?
    const filtered = prefix ? lines.filter(([cmd])=>cmd.startsWith(prefix.split(' ').pop())) : lines;
    // Show IOS-style in terminal
    cliAppend('blank','');
    filtered.forEach(([cmd,desc,ptsa])=>{
      const d=document.createElement('div');
      d.style.cssText='font-family:var(--mono);font-size:13px;line-height:1.7;display:flex;gap:0';
      const cmdSpan=document.createElement('span');
      cmdSpan.style.cssText='color:'+(ptsa?'#79c0ff':'#e6edf3')+';min-width:220px;display:inline-block';
      cmdSpan.textContent='  '+(prefix?cmd:cmd);
      const descSpan=document.createElement('span');
      descSpan.style.cssText='color:#484f58';
      descSpan.textContent=desc;
      d.appendChild(cmdSpan); d.appendChild(descSpan);
      document.getElementById('cli-output').appendChild(d);
    });
    cliAppend('blank','');
    document.getElementById('cli-terminal-wrap').scrollTop=99999;
    // Show PTSA-relevant ones in panel
    const ptsaLines = filtered.filter(([,,ptsa])=>ptsa);
    const fb=document.getElementById('ip-feedback');
    if(fb&&ptsaLines.length>0){
      fb.innerHTML='<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:8px">PTSA relevant</div>'+
        ptsaLines.map(([cmd,desc])=>
          `<div style="margin-bottom:8px"><span style="font-family:var(--mono);font-size:12px;color:var(--accent);display:block">${esc(cmd)}</span><span style="font-size:11px;color:var(--text-muted)">${esc(desc)}</span></div>`
        ).join('');
    } else if(fb){
      fb.innerHTML='<div style="font-size:11px;color:var(--text-dim)">No PTSA-relevant commands in this context.</div>';
    }
    return;
  }

  // conf t always works from priv in partial scenarios
  if(/^conf(igure)?(\s+t(erminal)?)?$/i.test(val.trim()) && cliMode==='priv' && sc.group==='partial'){
    cliMode='config';
    ipUpdateProgress(); cliSetPrompt();
    return;
  }

  // exit always works — returns to previous mode like real IOS
  if(/^exit$/i.test(val.trim())){
    const exitStep = sc.steps.find(s=>s.m.test(val.trim())&&modeOk(s)&&!cliDone.has(s.id));
    const doneExit = sc.steps.find(s=>s.m.test(val.trim())&&modeOk(s)&&cliDone.has(s.id));
    if(exitStep){
      // Mark done, change mode
      cliDone.add(exitStep.id);
      if(exitStep.set) cliMode=exitStep.set;
      ipUpdate('ok', exitStep.ok);
      const done2=cliDone.size;
      if(!cliProgress[cliCur]||done2>cliProgress[cliCur]) cliProgress[cliCur]=done2;
      cliUpdateSidebar(); cliUpdateHeader(); ipUpdateProgress();
    } else if(doneExit){
      // Already done exit — just update mode silently
      if(doneExit.set) cliMode=doneExit.set;
    } else {
      // No exit step for this mode — fallback mode change
      if(cliMode.startsWith('config-if')||cliMode.startsWith('config-line')||cliMode==='rsa-prompt') cliMode='config';
      else if(cliMode==='config') cliMode='priv';
    }
    ipUpdateProgress(); cliSetPrompt();
    return;
  }

  // Find matching step
  const step=findMatchingStep(val,sc);
  if(step){
    if(step.repeat){
      if(step.set) cliMode=step.set;
      ipUpdateProgress();
      cliSetPrompt();
      return;
    }
    cliDone.add(step.id);
    if(step.set) cliMode=step.set;
    // Show IOS syslog for no shutdown
    if(/^no\s+shut/i.test(val)){
      const sc2=SCEN[cliCur];
      const ifName = cliMode.startsWith('config-if-vlan') ? 'Vlan1'
        : cliMode.startsWith('config-if-g001') ? 'GigabitEthernet0/0/1'
        : cliMode.startsWith('config-if-g000') ? 'GigabitEthernet0/0/0'
        : cliMode.startsWith('config-if-range') ? 'range'
        : 'interface';
      if(ifName !== 'range'){
        setTimeout(()=>{
          cliAppend('sys','%LINK-5-CHANGED: Interface '+ifName+', changed state to up');
          cliAppend('sys','%LINEPROTO-5-UPDOWN: Line protocol on Interface '+ifName+', changed state to up');
          document.getElementById('cli-terminal-wrap').scrollTop=99999;
        }, 600);
      }
    }
    // Show IOS RSA prompt when entering rsa-prompt mode
    if(step.set==='rsa-prompt' && !step.repeat){
      const hostname = promptForMode('config',SCEN[cliCur]).replace('(config)#','').trim();
      const domain = ((SCEN[cliCur].vars||[]).find(v=>v.k==='Domain')||{v:'netsec.com'}).v;
      cliAppend('blank','');
      cliAppend('info','The name for the keys will be: '+hostname+'.'+domain);
      cliAppend('info','Choose the size of the key modulus in the range of 360 to 2048 for your');
      cliAppend('info','  General Purpose Keys. Choosing a key modulus greater than 512 may take');
      cliAppend('info','  a few minutes.');
      cliAppend('blank','');
    }
    // Validate value before showing ok
    const valWarning = validateInput(val, step);
    if(valWarning){
      ipUpdate('warn', valWarning);
    } else {
      ipUpdate('ok', step.ok);
    }
    // Extra tips in info panel
    let tip = null;
    if(/^description\s+/i.test(val)) tip='Note: description must match the exact text from your PT addressing table. The value varies per exam ID — copy it precisely, the grader checks for exact match.';
    if(/login\s+local/i.test(val)) tip='login local requires a local username — make sure username is configured first.';
    if(/^1024$/.test(val.trim())) tip='512-bit key = SSH 1.5/1.99 only. Always use 1024 bits for SSH version 2.';
    if(/security\s+passwords\s+min-length/i.test(val)) tip='"passwords" (plural) and "min-length" with a hyphen. Not visible via ? in Packet Tracer.';
    if(/ip\s+default-gateway/i.test(val)) tip='ip default-gateway is only required on switches. Routers use routing tables.';
    if(/no\s+ip\s+domain-lookup/i.test(val)) tip='Without this, IOS tries to resolve mistyped commands as DNS hostnames — causes long delays.';
    if(tip){
      if(/^description\s+/i.test(val)) ipUpdate('info', tip);
      else setTimeout(()=>ipUpdate('info', tip), 1800);
    }
    const done=cliDone.size;
    if(!cliProgress[cliCur]||done>cliProgress[cliCur]) cliProgress[cliCur]=done;
    cliUpdateSidebar(); cliUpdateHeader(); ipUpdateProgress();
    // Check completion
    const allDone=sc.steps.every(s=>cliDone.has(s.id));
    if(allDone){ cliAppend('blank',''); cliShowCompletion(); return; }
    cliSetPrompt();
    return;
  }

  // Check if step matches but blocked by requirements
  const blocked=findBlockedStep(val,sc);
  if(blocked){
    const missing=getMissingReqs(blocked,sc);
    cliAppend('err',"% Command not allowed here.");
    ipUpdate('warn', 'Missing prerequisite: ' + missing.join(', '));
    return;
  }

  // Unknown command — check for common mistakes
  cliAppend('err','Invalid input detected. Check syntax and current mode.');
  if(/^user\s+/.test(val)) cliAppend('warn','Invalid input. Did you mean: username <name> secret <password>');
  
  if(/ip\s+domain[^-]/.test(val)) cliAppend('warn','Invalid input. Correct syntax: ip domain-name <name>');
  
  
  
}

function cliShowHint(){
  const sc=SCEN[cliCur];
  const next=sc.steps.find(s=>!cliDone.has(s.id)&&s.req.every(r=>cliDone.has(r)));
  if(next) ipUpdate('warn', 'Next available: ' + next.cmd);
  else ipUpdate('warn', 'All available steps done, or prerequisites still missing.');
}

function cliCheckProgress(){
  const sc=SCEN[cliCur];
  const missing = sc.steps.filter(s=>!cliDone.has(s.id));
  const fb = document.getElementById('ip-feedback');
  if(!fb) return;
  if(missing.length===0){
    fb.innerHTML = '<div style="color:var(--green);font-size:13px;font-weight:500">All steps complete.</div>';
    return;
  }
  const available = missing.filter(s=>s.req.every(r=>cliDone.has(r)));
  const blocked = missing.filter(s=>!s.req.every(r=>cliDone.has(r)));
  let html = `<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:10px">Missing steps (${missing.length})</div>`;
  if(available.length>0){
    html += `<div style="font-size:11px;color:var(--yellow);margin-bottom:6px;font-weight:500">Still needed:</div>`;
    available.forEach(s=>{
      html += `<div style="font-family:var(--mono);font-size:12px;color:#c8c8b0;margin-bottom:5px;padding:4px 8px;background:var(--surface2);border-radius:3px;border-left:2px solid var(--yellow)">
        <span style="color:var(--text-dim);font-size:10px;display:block;margin-bottom:1px">${s.mode}</span>
        ${esc(s.cmd)}
      </div>`;
    });
  }
  if(blocked.length>0){
    html += `<div style="font-size:11px;color:var(--text-dim);margin-top:10px;margin-bottom:6px;font-weight:500">Blocked (prereqs missing):</div>`;
    blocked.forEach(s=>{
      const missing_reqs = s.req.filter(r=>!cliDone.has(r)).map(r=>{
        const rs=sc.steps.find(x=>x.id===r); return rs?rs.cmd:r;
      });
      html += `<div style="font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-bottom:5px;padding:4px 8px;background:var(--surface);border-radius:3px;border-left:2px solid var(--text-dim)">
        ${esc(s.cmd)}<br>
        <span style="font-size:10px;color:#484f58">needs: ${missing_reqs.map(r=>esc(r)).join(', ')}</span>
      </div>`;
    });
  }
  fb.innerHTML = html;
}

function cliReset(){
  document.getElementById('cli-completion').classList.remove('show');
  cliDone=new Set();
  const sc=SCEN[cliCur];
  cliMode=sc.group==='partial'?(sc.steps[0].mode||'config'):'exec';
  document.getElementById('cli-output').innerHTML='';
  document.getElementById('cli-cmd-input').disabled=false;
  // Reset info panel fully
  stuckUsed=false;
  const stuckBtn=document.getElementById('ip-stuck-btn'); if(stuckBtn){stuckBtn.classList.remove('used');}
  const stuckContent=document.getElementById('ip-stuck-content'); if(stuckContent){stuckContent.classList.remove('show');stuckContent.textContent='';}
  const stuckArrow=document.getElementById('ip-stuck-arrow'); if(stuckArrow) stuckArrow.textContent='▸';
  const fb=document.getElementById('ip-feedback'); if(fb) fb.innerHTML='<div class="ip-feedback-msg" id="ip-msg" style="opacity:0"></div>';
  cliUpdateHeader(); cliSetPrompt(); ipUpdateProgress();
  cliAppend('sys','--- '+sc.name+' ---');
  cliAppend('blank','');
}

function cliNext(){
  document.getElementById('cli-completion').classList.remove('show');
  cliLoad((cliCur+1)%SCEN.length);
}

function cliShowCompletion(){
  const sc=SCEN[cliCur];
  const total=sc.steps.length;
  // Find any missed steps (shouldn't happen but just in case)
  const missed=sc.steps.filter(s=>!cliDone.has(s.id));
  let statsHtml=`completed: <span>${total}</span> steps`;
  if(missed.length>0){
    statsHtml+=`<br>gemist: <span class="missed">${missed.map(s=>s.cmd).join(', ')}</span>`;
  }
  document.getElementById('cli-cc-msg').textContent=sc.name+' completed.';
  document.getElementById('cli-cc-stats').innerHTML=statsHtml;
  document.getElementById('cli-completion').classList.add('show');
}

function cliUpdateHeader(){
  const sc=SCEN[cliCur];
  const done=cliDone.size, total=sc.steps.length;
  const prog=document.getElementById('cli-sh-progress');
  if(prog) prog.innerHTML=`<span>${done}</span>/${total}`;

}

function cliUpdateSidebar(){
  SCEN.forEach(sc=>{
    const done=cliProgress[sc.id]||0, total=sc.steps.length, pct=Math.round(done/total*100);
    const f=document.getElementById('cprog-'+sc.id), b=document.getElementById('cbadge-'+sc.id);
    if(f)f.style.width=pct+'%'; if(b)b.textContent=done+'/'+total;
  });
}

// Tab key handler
document.getElementById('cli-cmd-input').addEventListener('keydown',function(e){
  if(e.key==='Tab'){
    e.preventDefault();
    const completed=tryTab(this.value);
    if(completed) this.value=completed;
    return;
  }
  if(e.key==='Enter'){
    const v=this.value.trim(); this.value='';
    if(v) cliHandleInput(v);
  }
});

let addrCur=0, addrProg={};

function addrBuildSidebar(){
  const ipv4=document.getElementById('addr-sb-ipv4'), dual=document.getElementById('addr-sb-dual');
  const sel=document.getElementById('addr-mobile-select');
  const gI=document.createElement('optgroup'); gI.label='IPv4 only';
  const gD=document.createElement('optgroup'); gD.label='IPv4 + IPv6';
  ADDR.forEach(sc=>{
    const btn=document.createElement('button');
    btn.className='scen-btn'+(sc.id===0?' active':'');
    btn.id='addr-btn-'+sc.id; btn.onclick=()=>addrLoad(sc.id);
    const done=addrProg[sc.id]||0, total=addrCount(sc), pct=total>0?Math.round(done/total*100):0;
    btn.innerHTML=`<div class="scen-icon" style="background:${sc.tagColor};color:${sc.tagText};font-size:8px;line-height:1.2">${sc.tag}</div>
      <div class="scen-text"><span class="scen-name">${sc.name}</span><span class="scen-type">${sc.type}</span>
      <div class="prog-mini"><div class="prog-mini-fill" id="aprog-${sc.id}" style="width:${pct}%"></div></div></div>
      <span class="scen-badge" id="abadge-${sc.id}">${done}/${total}</span>`;
    (sc.group==='ipv4'?ipv4:dual).appendChild(btn);
    const opt=document.createElement('option'); opt.value=sc.id; opt.textContent=sc.name;
    (sc.group==='ipv4'?gI:gD).appendChild(opt);
  });
  sel.appendChild(gI); sel.appendChild(gD);
}

function addrCount(sc){let n=0;sc.rows.forEach(r=>r.cells.forEach(c=>{if(c.editable)n++;}));return n;}
function addrId(ri,ci){return `a-${addrCur}-${ri}-${ci}`;}
function rtClass(rt){if(!rt)return '';if(rt==='IPv4')return 'td-type-ipv4';if(rt==='IPv6')return 'td-type-ipv6';if(rt==='Link-local')return 'td-type-ll';return '';}

function addrLoad(idx){
  addrCur=idx;
  document.querySelectorAll('#panel-addr .scen-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('addr-btn-'+idx); if(btn)btn.classList.add('active');
  document.getElementById('addr-mobile-select').value=idx;
  addrRender();
}

function addrRender(){
  const sc=ADDR[addrCur], isDual=!!sc.dual, total=addrCount(sc);
  let html=`<div class="scenario-info"><h2>${sc.name}</h2><p>${sc.desc}</p></div>`;
  if(sc.network){
    html+=`<div class="network-banner">
      <span class="nb-label">Network address:</span>
      <span class="nb-val">${sc.network}</span>
      ${sc.subnets?'<span class="nb-sep">—</span>'+sc.subnets.map(s=>`<span class="nb-sub">${s}</span>`).join('<span class="nb-sep">·</span>'):''}
    </div>`;
  }
  html+=`<div class="hint-collapsible">
    <button class="hint-toggle" onclick="this.parentElement.classList.toggle('open')">
      <span class="ht-icon">▸</span> show hint
    </button>
    <div class="hint-content"><strong>Note:</strong> ${sc.hint}</div>
  </div>`;
  if(sc.topology){
    html+=`<div class="topology-wrap addr-topology">${sc.topology}</div>`;
  }
  if(isDual){html+=`<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--surface2);border:1px solid var(--border)"></div>fill in</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--surface3);border:1px solid var(--text-dim)"></div><em style="color:var(--text-dim)">given</em></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent);opacity:0.4"></div><span style="color:var(--accent)">IPv4</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green);opacity:0.4"></div><span style="color:var(--green)">IPv6</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--yellow);opacity:0.4"></div><span style="color:var(--yellow)">Link-local</span></div>
  </div>`;}
  html+=`<div class="result-banner" id="addr-result"></div>
  <div class="addr-actions">
    <button class="abtn abtn-check" onclick="addrCheck()">check answers</button>
    <button class="abtn abtn-reveal" onclick="addrReveal()">show answers</button>
    <button class="abtn abtn-reset" onclick="addrReset()">reset</button>
    <div class="score-display" id="addr-score">0/<span>${total}</span></div>
  </div>
  <div class="table-wrap"><table><thead><tr>`;
  sc.columns.forEach(c=>{html+=`<th>${c}</th>`;});
  html+=`</tr></thead><tbody>`;
  let lastDev=null;
  sc.rows.forEach((row,ri)=>{
    const showDev=row.device!==lastDev;
    const prev=ri>0?sc.rows[ri-1]:null;
    const showIface=!prev||prev.device!==row.device||prev.iface!==row.iface;
    if(showDev&&ri>0)html+=`<tr class="divider-row"><td colspan="${sc.columns.length}"><div class="divider-line"></div></td></tr>`;
    html+=`<tr><td class="td-device">${showDev?row.device:''}</td><td class="td-iface">${showIface?row.iface:''}</td>`;
    if(isDual)html+=`<td class="${rtClass(row.rowtype)}">${row.rowtype||''}</td>`;
    row.cells.forEach((cell,ci)=>{
      if(cell.na)html+=`<td class="cell-na">N/A</td>`;
      else if(cell.given)html+=`<td class="cell-given">${cell.answer}</td>`;
      else if(!cell.editable)html+=`<td class="cell-static">${cell.answer}</td>`;
      else{const ph=cell.type==='gw6'?'fe80::?':'...';html+=`<td><input class="cell-input" id="${addrId(ri,ci)}" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="${ph}"/></td>`;}
    });
    html+=`</tr>`; lastDev=row.device;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('addr-main-content').innerHTML=html;
}

function norm(v){return v.trim().toLowerCase().replace(/\s+/g,'');}

function addrCheck(){
  const sc=ADDR[addrCur]; let correct=0,total=0;
  sc.rows.forEach((row,ri)=>row.cells.forEach((cell,ci)=>{
    if(!cell.editable)return; total++;
    const inp=document.getElementById(addrId(ri,ci)); if(!inp)return;
    inp.classList.remove('correct','wrong','revealed');
    if(norm(inp.value)===norm(cell.answer)){inp.classList.add('correct');correct++;}
    else if(inp.value.trim()!==''){inp.classList.add('wrong');}
  }));
  addrProg[addrCur]=correct; addrUpdateSidebar();
  const pct=total>0?Math.round(correct/total*100):0;
  const b=document.getElementById('addr-result');
  b.className='result-banner show '+(pct>=80?'pass':'fail');
  b.innerHTML=`<div class="rb-score">${pct}%</div><div class="rb-msg">${correct} van ${total} correct${pct<80?' — gebruik "toon antwoorden" om te zien wat er mis is.':''}</div>`;
  document.getElementById('addr-score').innerHTML=`<span>${correct}</span>/${total}`;
}

function addrReveal(){
  const sc=ADDR[addrCur];
  sc.rows.forEach((row,ri)=>row.cells.forEach((cell,ci)=>{
    if(!cell.editable)return;
    const inp=document.getElementById(addrId(ri,ci)); if(!inp)return;
    inp.classList.remove('correct','wrong'); inp.classList.add('revealed'); inp.value=cell.answer;
  }));
  addrProg[addrCur]=0; addrUpdateSidebar();
}

function addrReset(){
  const sc=ADDR[addrCur];
  sc.rows.forEach((row,ri)=>row.cells.forEach((cell,ci)=>{
    if(!cell.editable)return;
    const inp=document.getElementById(addrId(ri,ci)); if(!inp)return;
    inp.classList.remove('correct','wrong','revealed'); inp.value='';
  }));
  const b=document.getElementById('addr-result'); if(b)b.className='result-banner';
  document.getElementById('addr-score').innerHTML=`0/<span>${addrCount(ADDR[addrCur])}</span>`;
}

function addrUpdateSidebar(){
  ADDR.forEach(sc=>{
    const done=addrProg[sc.id]||0, total=addrCount(sc), pct=total>0?Math.round(done/total*100):0;
    const f=document.getElementById('aprog-'+sc.id), b=document.getElementById('abadge-'+sc.id);
    if(f)f.style.width=pct+'%'; if(b)b.textContent=done+'/'+total;
  });
}

// ── INFO PANEL ──
let ipFadeTimer = null;
let stuckUsed = false;

function ipUpdate(type, msg){
  const el = document.getElementById('ip-msg');
  if(!el) return;
  if(ipFadeTimer) clearTimeout(ipFadeTimer);
  el.className = 'ip-feedback-msg ' + type;
  el.style.opacity = 1;
  el.textContent = msg;
  if(type === 'ok' || type === 'info'){
    ipFadeTimer = setTimeout(()=>{ if(el){el.style.opacity = 0.35; el.classList.add('fade');} }, 4000);
  }
}

function ipUpdateProgress(){
  const sc = SCEN[cliCur];
  const done = cliDone.size, total = sc.steps.length;
  const pct = Math.round(done/total*100);
  const fill=document.getElementById('ip-fill'); if(fill) fill.style.width = pct+'%';
  const doneEl=document.getElementById('ip-done'); if(doneEl) doneEl.textContent = done;
  const totalEl=document.getElementById('ip-total'); if(totalEl) totalEl.textContent = total;
  const modeEl=document.getElementById('ip-mode'); if(modeEl) modeEl.textContent = cliMode;
}

function toggleStuck(){
  const btn = document.getElementById('ip-stuck-btn');
  const content = document.getElementById('ip-stuck-content');
  const arrow = document.getElementById('ip-stuck-arrow');
  const sc = SCEN[cliCur];
  const next = sc.steps.find(s=>!cliDone.has(s.id)&&s.req.every(r=>cliDone.has(r)));
  if(content.classList.contains('show')){
    content.classList.remove('show');
    arrow.textContent = '▸';
  } else {
    stuckUsed = true;
    btn.classList.add('used');
    content.classList.add('show');
    arrow.textContent = '▾';
    if(next){
      content.textContent = 'Next: ' + next.cmd;
    } else {
      const blocked = sc.steps.find(s=>!cliDone.has(s.id));
      content.textContent = blocked ? 'Missing prereqs for: ' + blocked.cmd : 'All steps complete.';
    }
  }
}

cliBuildSidebar(); cliLoad(0);
addrBuildSidebar(); addrLoad(0);
