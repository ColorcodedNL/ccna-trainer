<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA 1 Praktijk Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0e14; --surface: #0d1117; --surface2: #161b22; --surface3: #21262d;
  --border: #30363d; --text: #e6edf3; --text-muted: #7d8590; --text-dim: #484f58;
  --green: #3fb950; --green-bg: #0d2b12; --red: #f85149; --red-bg: #2d0f0e;
  --yellow: #d29922; --blue: #79c0ff; --prompt: #a5d6ff; --accent: #58a6ff;
  --mono: 'JetBrains Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  --sidebar-w: 240px;
}
html { background: var(--bg); color: var(--text); font-family: var(--sans); }
body { min-height: 100vh; display: flex; flex-direction: column; }

/* ── TOPBAR ── */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; align-items: stretch; flex-shrink: 0; position: sticky; top: 0; z-index: 20; }
.topbar-brand { display: flex; align-items: center; gap: 8px; padding: 10px 0; margin-right: 16px; }
.logo { width: 26px; height: 26px; background: var(--accent); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 9px; font-weight: 500; color: #0a0e14; flex-shrink: 0; }
.brand-title { font-size: 13px; font-weight: 600; white-space: nowrap; }
.tabs { display: flex; align-items: stretch; }
.tab-btn { background: transparent; border: none; border-bottom: 2px solid transparent; padding: 0 14px; cursor: pointer; font-family: var(--sans); font-size: 12px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-icon { width: 16px; height: 16px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 8px; font-weight: 500; flex-shrink: 0; }
.topbar-right { margin-left: auto; display: flex; align-items: center; }
.topbar-sub { font-size: 10px; color: var(--text-dim); font-family: var(--mono); }

/* ── TAB PANELS ── */
.tab-panel { display: none; flex: 1; }
.tab-panel.active { display: flex; flex-direction: column; }

/* ── SHARED SIDEBAR + MAIN LAYOUT ── */
.app-layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 42px); }

/* Desktop sidebar */
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 10px 0; overflow-y: auto; }
.sb-section { padding: 0 8px; margin-bottom: 14px; }
.sb-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); padding: 0 8px; margin-bottom: 3px; }
.scen-btn { width: 100%; text-align: left; background: transparent; border: none; border-radius: 5px; padding: 6px 8px; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: background 0.1s; margin-bottom: 1px; }
.scen-btn:hover { background: var(--surface2); }
.scen-btn.active { background: var(--surface3); }
.scen-icon { width: 22px; height: 22px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; font-family: var(--mono); font-weight: 500; line-height: 1.2; text-align: center; }
.scen-text { flex: 1; min-width: 0; }
.scen-name { font-size: 11px; font-weight: 500; color: var(--text); display: block; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.scen-type { font-size: 10px; color: var(--text-muted); display: block; }
.scen-badge { font-size: 9px; font-family: var(--mono); color: var(--text-dim); background: var(--surface3); padding: 1px 4px; border-radius: 3px; border: 1px solid var(--border); flex-shrink: 0; }
.scen-btn.active .scen-badge { color: var(--accent); border-color: var(--accent); }
.prog-mini { height: 2px; background: var(--surface3); border-radius: 1px; margin-top: 3px; overflow: hidden; }
.prog-mini-fill { height: 100%; background: var(--green); border-radius: 1px; transition: width 0.4s; }

/* Mobile dropdown (hidden on desktop) */
.mobile-select-wrap { display: none; padding: 8px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.mobile-select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: var(--sans); font-size: 12px; padding: 6px 10px; outline: none; cursor: pointer; }
.mobile-select:focus { border-color: var(--accent); }

/* ── CLI TRAINER ── */
.cli-main { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-width: 0; }
.scenario-header { padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: flex-start; gap: 10px; flex-shrink: 0; }
.sh-badge { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; margin-top: 2px; font-family: var(--mono); }
.sh-desc { font-size: 11px; color: var(--text-muted); line-height: 1.5; flex: 1; }
.sh-progress { font-size: 10px; font-family: var(--mono); color: var(--text-muted); flex-shrink: 0; margin-top: 2px; white-space: nowrap; }
.sh-progress span { color: var(--green); font-weight: 500; }
.cli-main-wrapper { position: relative; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.terminal-wrap { flex: 1; overflow-y: auto; padding: 12px 14px; background: var(--bg); }
.terminal-output { font-family: var(--mono); font-size: 12px; line-height: 1.85; }
.line-prompt { color: var(--prompt); }
.line-cmd { color: var(--text); }
.line-ok { color: var(--green); } .line-ok::before { content: '  '; }
.line-err { color: var(--red); } .line-err::before { content: '  '; }
.line-warn { color: var(--yellow); } .line-warn::before { content: '  '; }
.line-info { color: var(--blue); } .line-info::before { content: '  '; }
.line-sys { color: var(--text-dim); font-style: italic; }
.line-blank { height: 4px; display: block; }
.input-area { border-top: 1px solid var(--border); background: var(--surface); padding: 8px 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.input-prompt { font-family: var(--mono); font-size: 12px; color: var(--prompt); white-space: nowrap; flex-shrink: 0; max-width: 45%; overflow: hidden; text-overflow: ellipsis; }
.input-field { flex: 1; background: transparent; border: none; outline: none; font-family: var(--mono); font-size: 12px; color: var(--text); caret-color: var(--accent); min-width: 0; }
.input-field::placeholder { color: var(--text-dim); }
.input-field:disabled { opacity: 0.3; }
.btn-sm { font-family: var(--sans); font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.1s; white-space: nowrap; }
.btn-hint:hover { border-color: var(--yellow); color: var(--yellow); }
.btn-sreset:hover { border-color: var(--red); color: var(--red); }
.completion { display: none; position: absolute; inset: 0; background: rgba(10,14,20,0.9); align-items: center; justify-content: center; z-index: 10; padding: 16px; }
.completion.show { display: flex; }
.completion-card { background: var(--surface); border: 1px solid var(--green); border-radius: 10px; padding: 24px 28px; text-align: center; max-width: 320px; width: 100%; }
.cc-icon { font-size: 11px; font-family: var(--mono); color: var(--green); font-weight: 500; margin-bottom: 8px; }
.completion-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
.completion-card p { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.5; }
.cc-stats { font-family: var(--mono); font-size: 11px; color: var(--text-muted); margin-bottom: 14px; padding: 7px; background: var(--surface2); border-radius: 5px; }
.cc-stats span { color: var(--green); }
.cc-btn { font-family: var(--sans); font-size: 11px; font-weight: 500; padding: 6px 14px; border-radius: 5px; border: 1px solid var(--green); background: var(--green-bg); color: var(--green); cursor: pointer; margin: 3px; transition: all 0.1s; }
.cc-btn:hover { background: var(--green); color: var(--bg); }
.cc-btn-sec { border-color: var(--border); background: transparent; color: var(--text-muted); }
.cc-btn-sec:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }

/* ── ADRESTABEL ── */
.addr-main { flex: 1; overflow-y: auto; padding: 16px; min-width: 0; }
.scenario-info h2 { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.scenario-info p { font-size: 11px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
.hint-box { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 9px 12px; margin-bottom: 12px; font-size: 11px; color: var(--text-muted); line-height: 1.6; }
.hint-box strong { color: var(--yellow); font-weight: 500; }
.legend { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-muted); }
.legend-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
.result-banner { padding: 9px 12px; border-radius: 5px; margin-bottom: 12px; display: none; align-items: center; gap: 10px; }
.result-banner.show { display: flex; }
.result-banner.pass { background: var(--green-bg); border: 1px solid var(--green); }
.result-banner.fail { background: var(--red-bg); border: 1px solid var(--red); }
.rb-score { font-family: var(--mono); font-size: 16px; font-weight: 500; }
.result-banner.pass .rb-score { color: var(--green); }
.result-banner.fail .rb-score { color: var(--red); }
.rb-msg { font-size: 11px; color: var(--text-muted); }
.addr-actions { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.abtn { font-family: var(--sans); font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.1s; }
.abtn:hover { background: var(--surface2); color: var(--text); }
.abtn-check { border-color: var(--green); color: var(--green); } .abtn-check:hover { background: var(--green-bg); }
.abtn-reveal { border-color: var(--accent); color: var(--accent); } .abtn-reveal:hover { background: rgba(88,166,255,0.08); }
.abtn-reset { border-color: var(--red); color: var(--red); } .abtn-reset:hover { background: var(--red-bg); }
.score-display { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
.score-display span { color: var(--green); font-weight: 500; }
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
thead th { background: var(--surface2); color: var(--text-muted); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; padding: 7px 8px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr.divider-row { border-bottom: none; }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 4px 6px; vertical-align: middle; }
.td-device { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 500; white-space: nowrap; }
.td-iface { font-family: var(--mono); font-size: 10px; color: var(--text-muted); white-space: nowrap; }
.td-type-ipv4 { font-size: 9px; color: var(--accent); font-family: var(--mono); white-space: nowrap; }
.td-type-ipv6 { font-size: 9px; color: var(--green); font-family: var(--mono); white-space: nowrap; }
.td-type-ll { font-size: 9px; color: var(--yellow); font-family: var(--mono); white-space: nowrap; }
.cell-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 3px 6px; font-family: var(--mono); font-size: 11px; color: var(--text); outline: none; transition: border-color 0.1s; min-width: 100px; }
.cell-input:focus { border-color: var(--accent); }
.cell-input.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
.cell-input.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }
.cell-input.revealed { border-color: var(--yellow); background: #271e05; color: var(--yellow); }
.cell-static { font-family: var(--mono); font-size: 11px; color: var(--text-muted); padding: 3px 2px; }
.cell-given { font-family: var(--mono); font-size: 11px; color: var(--text-dim); padding: 3px 2px; font-style: italic; }
.cell-na { font-family: var(--mono); font-size: 10px; color: var(--text-dim); padding: 3px 2px; }
.divider-line { height: 1px; background: var(--surface3); margin: 1px 0; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .mobile-select-wrap { display: block; }
  .app-layout { height: auto; overflow: visible; }
  .tab-panel.active { height: auto; }
  .cli-main { height: auto; overflow: visible; }
  .cli-main-wrapper { height: auto; overflow: visible; position: static; }
  .terminal-wrap { height: 280px; overflow-y: auto; }
  .topbar-sub { display: none; }
  .brand-title { font-size: 12px; }
  .sh-desc { display: none; }
  .addr-main { overflow: visible; }
  .cell-input { min-width: 80px; }
}
@media (max-width: 480px) {
  .tab-btn { padding: 0 10px; font-size: 11px; }
  .terminal-wrap { height: 240px; }
  .input-prompt { max-width: 35%; font-size: 11px; }
  .input-field { font-size: 11px; }
  .terminal-output { font-size: 11px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="logo">IOS</div>
    <span class="brand-title">CCNA 1 Trainer</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('cli')" id="tab-cli">
      <div class="tab-icon" style="background:#1f4b7a;color:#79c0ff">CLI</div>
      CLI
    </button>
    <button class="tab-btn" onclick="switchTab('addr')" id="tab-addr">
      <div class="tab-icon" style="background:#1a3a1a;color:#3fb950">ADR</div>
      Adrestabel
    </button>
  </div>
  <div class="topbar-right">
    <span class="topbar-sub">CCNA 1 v7.0 — PTSA</span>
  </div>
</div>

<!-- CLI TAB -->
<div class="tab-panel active" id="panel-cli">
  <div class="mobile-select-wrap">
    <select class="mobile-select" id="cli-mobile-select" onchange="cliLoad(parseInt(this.value))"></select>
  </div>
  <div class="app-layout">
    <div class="sidebar" id="cli-sidebar">
      <div class="sb-section">
        <div class="sb-label">Volledige setup</div>
        <div id="cli-sb-full"></div>
      </div>
      <div class="sb-section">
        <div class="sb-label">Deelscenario's</div>
        <div id="cli-sb-partial"></div>
      </div>
    </div>
    <div class="cli-main">
      <div class="scenario-header">
        <div class="sh-badge" id="cli-sh-badge"></div>
        <div class="sh-desc" id="cli-sh-desc"></div>
        <div class="sh-progress" id="cli-sh-progress"></div>
      </div>
      <div class="cli-main-wrapper">
        <div class="terminal-wrap" id="cli-terminal-wrap">
          <div class="terminal-output" id="cli-output"></div>
        </div>
        <div class="input-area">
          <div class="input-prompt" id="cli-input-prompt"></div>
          <input class="input-field" id="cli-cmd-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="commando + Enter..." />
          <button class="btn-sm btn-hint" onclick="cliShowHint()">hint</button>
          <button class="btn-sm btn-sreset" onclick="cliReset()">reset</button>
        </div>
        <div class="completion" id="cli-completion">
          <div class="completion-card">
            <div class="cc-icon">[ SCENARIO VOLTOOID ]</div>
            <h2>Goed gedaan</h2>
            <p id="cli-cc-msg"></p>
            <div class="cc-stats" id="cli-cc-stats"></div>
            <button class="cc-btn cc-btn-sec" onclick="cliReset()">herhaal</button>
            <button class="cc-btn" onclick="cliNext()">volgende &rarr;</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADRESTABEL TAB -->
<div class="tab-panel" id="panel-addr">
  <div class="mobile-select-wrap">
    <select class="mobile-select" id="addr-mobile-select" onchange="addrLoad(parseInt(this.value))"></select>
  </div>
  <div class="app-layout">
    <div class="sidebar" id="addr-sidebar">
      <div class="sb-section">
        <div class="sb-label">IPv4 only</div>
        <div id="addr-sb-ipv4"></div>
      </div>
      <div class="sb-section">
        <div class="sb-label">IPv4 + IPv6</div>
        <div id="addr-sb-dual"></div>
      </div>
    </div>
    <div class="addr-main" id="addr-main-content"></div>
  </div>
</div>

<script>
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  if(name==='cli'){const f=document.getElementById('cli-cmd-input');if(f&&!f.disabled)f.focus();}
}

let cliCurrent=0,cliStep=0,cliHintUsed=[],cliProgress={};

function cliBuildSidebar(){
  const full=document.getElementById('cli-sb-full'),partial=document.getElementById('cli-sb-partial');
  const sel=document.getElementById('cli-mobile-select');
  const grpFull=document.createElement('optgroup'); grpFull.label='Volledige setup';
  const grpPartial=document.createElement('optgroup'); grpPartial.label="Deelscenario's";
  cliScenarios.forEach(sc=>{
    const btn=document.createElement('button');
    btn.className='scen-btn'+(sc.id===0?' active':'');
    btn.id='cli-btn-'+sc.id; btn.onclick=()=>cliLoad(sc.id);
    const done=cliProgress[sc.id]||0,total=sc.steps.length,pct=Math.round(done/total*100);
    btn.innerHTML=`<div class="scen-icon" style="background:${sc.tagColor};color:${sc.tagText}">${sc.tag.slice(0,3)}</div>
      <div class="scen-text"><span class="scen-name">${sc.name}</span><span class="scen-type">${sc.type}</span>
      <div class="prog-mini"><div class="prog-mini-fill" id="cli-prog-${sc.id}" style="width:${pct}%"></div></div></div>
      <span class="scen-badge" id="cli-badge-${sc.id}">${done}/${total}</span>`;
    (sc.group==='full'?full:partial).appendChild(btn);
    const opt=document.createElement('option'); opt.value=sc.id; opt.textContent=sc.name;
    (sc.group==='full'?grpFull:grpPartial).appendChild(opt);
  });
  sel.appendChild(grpFull); sel.appendChild(grpPartial);
}

function cliLoad(idx){
  cliCurrent=idx; cliStep=0; cliHintUsed=[];
  document.querySelectorAll('#panel-cli .scen-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('cli-btn-'+idx); if(btn)btn.classList.add('active');
  document.getElementById('cli-mobile-select').value=idx;
  const sc=cliScenarios[idx];
  const badge=document.getElementById('cli-sh-badge');
  badge.textContent=sc.tag; badge.style.background=sc.tagColor; badge.style.color=sc.tagText;
  document.getElementById('cli-sh-desc').textContent=sc.desc;
  document.getElementById('cli-output').innerHTML='';
  document.getElementById('cli-completion').classList.remove('show');
  document.getElementById('cli-cmd-input').disabled=false;
  cliUpdateHeader(); cliSetPrompt();
  cliAppend('sys','--- '+sc.name+' ---'); cliAppend('blank','');
}

function cliSetPrompt(){
  const sc=cliScenarios[cliCurrent];
  if(cliStep<sc.steps.length){
    document.getElementById('cli-input-prompt').textContent=sc.steps[cliStep].p+' ';
    document.getElementById('cli-cmd-input').disabled=false;
  } else {
    document.getElementById('cli-input-prompt').textContent='';
    document.getElementById('cli-cmd-input').disabled=true;
  }
}

function cliEsc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function cliAppend(type,text){
  const out=document.getElementById('cli-output');
  const div=document.createElement('div');
  if(type==='blank'){div.className='line-blank';}
  else if(type==='prompt-cmd'){div.innerHTML=`<span class="line-prompt">${cliEsc(text.p)} </span><span class="line-cmd">${cliEsc(text.cmd)}</span>`;}
  else{div.className='line-'+type; div.textContent=text;}
  out.appendChild(div);
  document.getElementById('cli-terminal-wrap').scrollTop=99999;
}

function cliHandleInput(val){
  const sc=cliScenarios[cliCurrent];
  if(cliStep>=sc.steps.length)return;
  const cur=sc.steps[cliStep];
  cliAppend('prompt-cmd',{p:cur.p,cmd:val});
  if(cur.m.test(val.trim())){
    cliAppend('ok',cur.ok);
    if(/login\s+local/i.test(val))cliAppend('info','Tip: login local vereist een bestaande username in de lokale database.');
    if(/^1024$/.test(val.trim()))cliAppend('info','Tip: 512 bit = SSH 1.5/1.99. Altijd 1024 voor SSH v2.');
    if(/security\s+passwords\s+min-length/i.test(val))cliAppend('info','Tip: "passwords" met s, "min-length" met koppelteken. Niet via ? in PT.');
    if(/ip\s+default-gateway/i.test(val))cliAppend('info','Tip: alleen op switches. Routers hebben routing.');
    if(/no\s+ip\s+domain-lookup/i.test(val))cliAppend('info','Tip: zonder dit probeert IOS typfouten als hostnamen op te zoeken.');
    if(!cliHintUsed[cliStep]){if(!cliProgress[cliCurrent])cliProgress[cliCurrent]=0;if(cliStep+1>cliProgress[cliCurrent])cliProgress[cliCurrent]=cliStep+1;}
    cliStep++; cliUpdateSidebar(); cliUpdateHeader();
    if(cliStep>=sc.steps.length){cliAppend('blank','');cliShowCompletion();return;}
    cliSetPrompt();
  } else {
    cliAppend('err','Fout commando. Controleer syntax en volgorde.');
    if(/^user\s+/.test(val))cliAppend('warn','Hint: commando is "username", niet "user".');
    if(/input\s+transport/.test(val))cliAppend('warn','Hint: volgorde is "transport input ssh".');
    if(/ip\s+domain[^-]/.test(val))cliAppend('warn','Hint: "ip domain-name" met koppelteken.');
    if(/security\s+password\s+min/i.test(val)&&!/passwords/.test(val))cliAppend('warn','Hint: "security passwords" met s.');
    if(/vty\s+0\s+15/.test(val)&&cur.cmd.includes('0 4'))cliAppend('warn','Hint: router gebruikt "line vty 0 4" (5 lines).');
    if(/vty\s+0\s+4/.test(val)&&cur.cmd.includes('0 15'))cliAppend('warn','Hint: switch gebruikt "line vty 0 15" (16 lines).');
    if(/login\s+local/i.test(val)&&cur.cmd==='login')cliAppend('warn','Hint: geen lokale user database hier. Gebruik "login".');
  }
}

function cliShowHint(){const sc=cliScenarios[cliCurrent];if(cliStep>=sc.steps.length)return;cliHintUsed[cliStep]=true;cliAppend('warn','Hint: '+sc.steps[cliStep].cmd);}
function cliReset(){document.getElementById('cli-completion').classList.remove('show');cliStep=0;cliHintUsed=[];document.getElementById('cli-output').innerHTML='';document.getElementById('cli-cmd-input').disabled=false;cliUpdateHeader();cliSetPrompt();cliAppend('sys','--- '+cliScenarios[cliCurrent].name+' (reset) ---');cliAppend('blank','');}
function cliNext(){document.getElementById('cli-completion').classList.remove('show');cliLoad((cliCurrent+1)%cliScenarios.length);}
function cliShowCompletion(){const h=cliHintUsed.filter(Boolean).length,t=cliScenarios[cliCurrent].steps.length;document.getElementById('cli-cc-msg').textContent=cliScenarios[cliCurrent].name+' afgerond.';document.getElementById('cli-cc-stats').innerHTML=`stappen: <span>${t}/${t}</span> &nbsp;|&nbsp; hints: <span>${h}</span>`;document.getElementById('cli-completion').classList.add('show');}
function cliUpdateHeader(){const sc=cliScenarios[cliCurrent];document.getElementById('cli-sh-progress').innerHTML=`stap <span>${cliStep}</span>/${sc.steps.length}`;}
function cliUpdateSidebar(){cliScenarios.forEach(sc=>{const done=cliProgress[sc.id]||0,total=sc.steps.length,pct=Math.round(done/total*100);const f=document.getElementById('cli-prog-'+sc.id),b=document.getElementById('cli-badge-'+sc.id);if(f)f.style.width=pct+'%';if(b)b.textContent=done+'/'+total;});}
document.getElementById('cli-cmd-input').addEventListener('keydown',function(e){if(e.key==='Enter'){const v=this.value.trim();this.value='';if(v)cliHandleInput(v);}});

let addrCurrent=0,addrProgress={};

function addrBuildSidebar(){
  const ipv4=document.getElementById('addr-sb-ipv4'),dual=document.getElementById('addr-sb-dual');
  const sel=document.getElementById('addr-mobile-select');
  const grpIPv4=document.createElement('optgroup'); grpIPv4.label='IPv4 only';
  const grpDual=document.createElement('optgroup'); grpDual.label='IPv4 + IPv6';
  addrScenarios.forEach(sc=>{
    const btn=document.createElement('button');
    btn.className='scen-btn'+(sc.id===0?' active':'');
    btn.id='addr-btn-'+sc.id; btn.onclick=()=>addrLoad(sc.id);
    const done=addrProgress[sc.id]||0,total=addrCountEditable(sc),pct=total>0?Math.round(done/total*100):0;
    btn.innerHTML=`<div class="scen-icon" style="background:${sc.tagColor};color:${sc.tagText};font-size:8px;line-height:1.2">${sc.tag}</div>
      <div class="scen-text"><span class="scen-name">${sc.name}</span><span class="scen-type">${sc.type}</span>
      <div class="prog-mini"><div class="prog-mini-fill" id="addr-prog-${sc.id}" style="width:${pct}%"></div></div></div>
      <span class="scen-badge" id="addr-badge-${sc.id}">${done}/${total}</span>`;
    (sc.group==='ipv4'?ipv4:dual).appendChild(btn);
    const opt=document.createElement('option'); opt.value=sc.id; opt.textContent=sc.name;
    (sc.group==='ipv4'?grpIPv4:grpDual).appendChild(opt);
  });
  sel.appendChild(grpIPv4); sel.appendChild(grpDual);
}

function addrCountEditable(sc){let n=0;sc.rows.forEach(r=>r.cells.forEach(c=>{if(c.editable)n++;}));return n;}
function addrInputId(ri,ci){return `addr-c-${addrCurrent}-${ri}-${ci}`;}

function addrLoad(idx){
  addrCurrent=idx;
  document.querySelectorAll('#panel-addr .scen-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('addr-btn-'+idx); if(btn)btn.classList.add('active');
  document.getElementById('addr-mobile-select').value=idx;
  addrRender();
}

function addrRowtypeClass(rt){if(!rt)return '';if(rt==='IPv4')return 'td-type-ipv4';if(rt==='IPv6')return 'td-type-ipv6';if(rt==='Link-local')return 'td-type-ll';return '';}

function addrRender(){
  const sc=addrScenarios[addrCurrent],isDual=!!sc.dual,total=addrCountEditable(sc);
  let html=`<div class="scenario-info"><h2>${sc.name}</h2><p>${sc.desc}</p></div>
  <div class="hint-box"><strong>Let op:</strong> ${sc.hint}</div>`;
  if(isDual){html+=`<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--surface2);border:1px solid var(--border)"></div>invullen</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--surface3);border:1px solid var(--text-dim)"></div><em style="color:var(--text-dim)">gegeven</em></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent);opacity:0.4"></div><span style="color:var(--accent)">IPv4</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green);opacity:0.4"></div><span style="color:var(--green)">IPv6</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--yellow);opacity:0.4"></div><span style="color:var(--yellow)">Link-local</span></div>
  </div>`;}
  html+=`<div class="result-banner" id="addr-result"></div>
  <div class="addr-actions">
    <button class="abtn abtn-check" onclick="addrCheck()">controleer</button>
    <button class="abtn abtn-reveal" onclick="addrReveal()">toon antwoorden</button>
    <button class="abtn abtn-reset" onclick="addrReset()">reset</button>
    <div class="score-display" id="addr-score">0/<span>${total}</span></div>
  </div>
  <div class="table-wrap"><table><thead><tr>`;
  sc.columns.forEach(col=>{html+=`<th>${col}</th>`;});
  html+=`</tr></thead><tbody>`;
  let lastDev=null;
  sc.rows.forEach((row,ri)=>{
    const showDev=row.device!==lastDev;
    const prevRow=ri>0?sc.rows[ri-1]:null;
    const showIface=!prevRow||prevRow.device!==row.device||prevRow.iface!==row.iface;
    if(showDev&&ri>0){html+=`<tr class="divider-row"><td colspan="${sc.columns.length}"><div class="divider-line"></div></td></tr>`;}
    html+=`<tr><td class="td-device">${showDev?row.device:''}</td><td class="td-iface">${showIface?row.iface:''}</td>`;
    if(isDual){html+=`<td class="${addrRowtypeClass(row.rowtype)}">${row.rowtype||''}</td>`;}
    row.cells.forEach((cell,ci)=>{
      if(cell.na){html+=`<td class="cell-na">N/A</td>`;}
      else if(cell.given){html+=`<td class="cell-given">${cell.answer}</td>`;}
      else if(!cell.editable){html+=`<td class="cell-static">${cell.answer}</td>`;}
      else{const ph=cell.type==='gw6'?'fe80::?':'...';html+=`<td><input class="cell-input" id="${addrInputId(ri,ci)}" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="${ph}" /></td>`;}
    });
    html+=`</tr>`;
    lastDev=row.device;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('addr-main-content').innerHTML=html;
}

function addrNorm(v){return v.trim().toLowerCase().replace(/\s+/g,'');}
function addrCheck(){
  const sc=addrScenarios[addrCurrent];let correct=0,total=0;
  sc.rows.forEach((row,ri)=>row.cells.forEach((cell,ci)=>{
    if(!cell.editable)return; total++;
    const inp=document.getElementById(addrInputId(ri,ci));if(!inp)return;
    inp.classList.remove('correct','wrong','revealed');
    if(addrNorm(inp.value)===addrNorm(cell.answer)){inp.classList.add('correct');correct++;}
    else if(inp.value.trim()!==''){inp.classList.add('wrong');}
  }));
  addrProgress[addrCurrent]=correct; addrUpdateSidebar();
  const pct=total>0?Math.round(correct/total*100):0;
  const b=document.getElementById('addr-result');
  b.className='result-banner show '+(pct>=80?'pass':'fail');
  b.innerHTML=`<div class="rb-score">${pct}%</div><div class="rb-msg">${correct} van ${total} correct${pct<80?' — gebruik "toon antwoorden" om te zien wat er mis is.':''}</div>`;
  document.getElementById('addr-score').innerHTML=`<span>${correct}</span>/${total}`;
}
function addrReveal(){
  const sc=addrScenarios[addrCurrent];
  sc.rows.forEach((row,ri)=>row.cells.forEach((cell,ci)=>{
    if(!cell.editable)return;
    const inp=document.getElementById(addrInputId(ri,ci));if(!inp)return;
    inp.classList.remove('correct','wrong');inp.classList.add('revealed');inp.value=cell.answer;
  }));
  addrProgress[addrCurrent]=0; addrUpdateSidebar();
}
function addrReset(){
  const sc=addrScenarios[addrCurrent];
  sc.rows.forEach((row,ri)=>row.cells.forEach((cell,ci)=>{
    if(!cell.editable)return;
    const inp=document.getElementById(addrInputId(ri,ci));if(!inp)return;
    inp.classList.remove('correct','wrong','revealed');inp.value='';
  }));
  const b=document.getElementById('addr-result');if(b)b.className='result-banner';
  document.getElementById('addr-score').innerHTML=`0/<span>${addrCountEditable(addrScenarios[addrCurrent])}</span>`;
}
function addrUpdateSidebar(){
  addrScenarios.forEach(sc=>{
    const done=addrProgress[sc.id]||0,total=addrCountEditable(sc),pct=total>0?Math.round(done/total*100):0;
    const f=document.getElementById('addr-prog-'+sc.id),b=document.getElementById('addr-badge-'+sc.id);
    if(f)f.style.width=pct+'%'; if(b)b.textContent=done+'/'+total;
  });
}

// ── INIT ──
cliBuildSidebar();
cliLoad(0);
addrBuildSidebar();
addrLoad(0);
</script>
